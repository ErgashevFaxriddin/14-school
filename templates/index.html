<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Django</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
    <h1>Salom, {{ ism }}!</h1>
    <h3>Xodimlar ro'yxati:</h3>

    <ul>
        {% for emp in employees %}
            <li>{{ emp.first_name }} {{ emp.last_name }} — {{ emp.email }}</li>
        {% empty %}
            <li>Hozircha bazada xodimlar yo'q.</li>
        {% endfor %}
    </ul>

    </style>
</head>
<body>
    <h1>Hello Django</h1>

</body>
</html>
